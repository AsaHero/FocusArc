apiVersion: v1
kind: Namespace
metadata:
  name: focusarc
---
# SQLite lives here. k3s ships the "local-path" provisioner by default, which
# binds this PVC to a directory on the node. ReadWriteOnce = single writer,
# which is exactly what SQLite requires.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: focusarc-data
  namespace: focusarc
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: focusarc
  namespace: focusarc
  labels: { app: focusarc }
spec:
  replicas: 1 # MUST stay 1 — SQLite is a single-writer file on an RWO volume.
  strategy:
    type: Recreate # never run two pods at once against the same DB file.
  selector:
    matchLabels: { app: focusarc }
  template:
    metadata:
      labels: { app: focusarc }
    spec:
      containers:
        - name: focusarc
          image: focusarc:latest
          imagePullPolicy: IfNotPresent # use the image imported into k3s (no registry pull)
          ports:
            - containerPort: 4000
          env:
            - name: PORT
              value: "4000"
            - name: DB_PATH
              value: /data/focusarc.db
            # Sign-in tokens are signed with this. MUST be a long random string
            # in production. Generate one: `openssl rand -hex 32`.
            - name: JWT_SECRET
              value: "change-me-to-a-long-random-string"
            - name: NODE_ENV
              value: production
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet: { path: /health, port: 4000 }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 4000 }
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: focusarc-data
---
apiVersion: v1
kind: Service
metadata:
  name: focusarc
  namespace: focusarc
spec:
  selector: { app: focusarc }
  ports:
    - port: 80
      targetPort: 4000
