apiVersion: apps/v1
kind: Deployment
metadata:
  name: focusarc
  namespace: focusarc
  labels: { app: focusarc }
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: { app: focusarc }
  template:
    metadata:
      labels: { app: focusarc }
    spec:
      containers:
        - name: focusarc
          image: docker.io/asahero/focusarc:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
          env:
            - name: PORT
              value: "4000"
            - name: DB_PATH
              value: /data/focusarc.db
            - name: JWT_SECRET
              value: e877210da16eeeb27fe644c4a0391d4434e2bad38664f199cc172dfa97af92b9
            - name: NODE_ENV
              value: production
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet: { path: /health, port: 4000 }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 4000 }
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: focusarc-data
