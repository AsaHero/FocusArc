# Public ingress via k3s's built-in Traefik. No auth (as chosen).
# Edit the host to your domain (or use the VPS IP with a nip.io host).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: focusarc
  namespace: focusarc
  annotations:
    # Optional HTTPS via Traefik's built-in ACME resolver (configure in k3s first):
    # traefik.ingress.kubernetes.io/router.entrypoints: websecure
    # traefik.ingress.kubernetes.io/router.tls.certresolver: le
    spec.ingressClassName: traefik
spec:
  ingressClassName: traefik
  rules:
    - host: focusarc.example.com # <-- change to your domain or <VPS_IP>.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: focusarc
                port:
                  number: 80
